<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Kumo LLC</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="favicon.png" type="image/png">
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <img src="assets/logo.png" alt="Kumo Logo" class="logo" />
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </div>
</nav>

<main>

<section class="contact-section">
  <div class="contact-container">
    <h1>Contact Kumo</h1>
    <p class="contact-intro">
      If you'd like to connect, collaborate, or learn more about our work,
      feel free to reach out.
    </p>

    <form action="https://formspree.io/f/xnjbrgvo" method="POST">
      
      <div class="form-group">
        <input type="text" name="name" placeholder="Name" required>
      </div>

      <div class="form-group">
        <input type="email" name="email" placeholder="Email" required>
      </div>

      <div class="form-group">
        <textarea name="message" placeholder="Message" rows="5" required></textarea>
      </div>

      <button type="submit" class="submit-btn">Send Message</button>

    </form>
  </div>
</section>

</main>

<footer>
  <p>© 2026 Kumo LLC. All rights reserved.</p>
</footer>

</body>
</html>
